<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── GLOBAL RESET & BASE ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f1a;
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── MAIN CARD ── */
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── TITLE ── */
    h1 {
      font-size: 1.5rem;
      letter-spacing: 4px;
      color: #e8ff3a;
      text-align: center;
    }

    .subtitle {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: #555570;
      text-transform: uppercase;
      margin-top: -16px;
    }

    /* ── TIMER BAR (shrinks left-to-right as time runs out) ── */
    .timer-bar-wrap {
      width: 100%;
      height: 5px;
      background: #2a2a45;
      border-radius: 3px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #3affcf, #e8ff3a);
      transform-origin: left;
      transition: transform 0.1s linear;
    }

    /* ── ROUND COUNTER ── */
    .round-info {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #555570;
      text-transform: uppercase;
    }

    .round-info span {
      color: #e8ff3a;
    }

    /* ── BIG CHARACTER BOX ── */
    .char-box {
      width: 160px;
      height: 160px;
      border: 2px solid #e8ff3a;
      border-radius: 16px;
      background: #12121f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .char-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #555570;
      text-transform: uppercase;
    }

    .char-letter {
      font-size: 6rem;
      font-weight: 700;
      color: #e8ff3a;
      line-height: 1;
    }

    /* Pop animation: letter bounces in on each new round */
    .char-letter.pop {
      animation: popIn 0.25s ease;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.4);
        opacity: 0;
      }

      70% {
        transform: scale(1.1);
        opacity: 1;
      }

      100% {
        transform: scale(1);
      }
    }

    /* ── PROGRESS DOTS (one per round) ── */
    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #555570;
      background: transparent;
      transition: all 0.3s;
    }

    .dot.active {
      border-color: #e8ff3a;
      animation: pulse 0.8s ease-in-out infinite;
    }

    .dot.correct {
      background: #3affcf;
      border-color: #3affcf;
    }

    .dot.wrong {
      background: #ff3a6e;
      border-color: #ff3a6e;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.4);
      }
    }

    /* ── INPUT BOX ── */
    .input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .input-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: #555570;
      text-transform: uppercase;
    }

    #charInput {
      width: 200px;
      height: 54px;
      background: #12121f;
      border: 2px solid #2a2a45;
      border-radius: 10px;
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 1.8rem;
      text-align: center;
      outline: none;
      caret-color: #e8ff3a;
      transition: border-color 0.2s;
    }

    #charInput:focus {
      border-color: #e8ff3a;
    }

    #charInput.correct {
      border-color: #3affcf;
      animation: flashGreen 0.3s ease;
    }

    #charInput.wrong {
      border-color: #ff3a6e;
      animation: shakeRed 0.35s ease;
    }

    @keyframes flashGreen {

      0%,
      100% {
        background: #12121f;
      }

      50% {
        background: rgba(58, 255, 207, 0.1);
      }
    }

    @keyframes shakeRed {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      75% {
        transform: translateX(8px);
      }
    }

    /* ── FEEDBACK TEXT ── */
    .feedback {
      height: 22px;
      font-size: 0.75rem;
      letter-spacing: 3px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .feedback.show {
      opacity: 1;
    }

    .feedback.show.ok {
      color: #3affcf;
    }

    .feedback.show.err {
      color: #ff3a6e;
    }

    /* ── RESULT SCREEN ── */
    .result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .result.show {
      display: flex;
    }

    .result-title {
      font-size: 2rem;
      letter-spacing: 4px;
      color: #e8ff3a;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .stat {
      background: #12121f;
      border: 1px solid #2a2a45;
      border-radius: 10px;
      padding: 16px 8px;
      text-align: center;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 700;
    }

    .stat-num.green {
      color: #3affcf;
    }

    .stat-num.red {
      color: #ff3a6e;
    }

    .stat-num.yellow {
      color: #e8ff3a;
    }

    .stat-name {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #555570;
      margin-top: 4px;
    }

    .acc-wrap {
      width: 100%;
    }

    .acc-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #555570;
      margin-bottom: 6px;
    }

    .acc-track {
      width: 100%;
      height: 6px;
      background: #2a2a45;
      border-radius: 3px;
      overflow: hidden;
    }

    .acc-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3affcf, #e8ff3a);
      border-radius: 3px;
      transition: width 1s ease;
    }

    .btn {
      padding: 12px 36px;
      background: #e8ff3a;
      color: #0f0f1a;
      border: none;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232, 255, 58, 0.35);
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>KEYBLITZ</h1>
    <p class="subtitle">Typing Speed Test</p>

    <!-- ── GAME SCREEN ── -->
    <div id="gameScreen" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:24px;">

      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>

      <div class="round-info">Round <span id="roundNum">1</span> of 10</div>

      <div class="char-box">
        <div class="char-label">Type this</div>
        <div class="char-letter" id="charLetter">?</div>
      </div>

      <div class="dots" id="dots"></div>

      <div class="input-wrap">
        <div class="input-label">Press the key above</div>
        <input id="charInput" type="text" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="off"
          spellcheck="false" placeholder="" />
        <div class="feedback" id="feedback"></div>
      </div>

    </div>

    <!-- ── RESULT SCREEN ── -->
    <div class="result" id="resultScreen">
      <div class="result-title" id="resultTitle">RESULTS</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-num green" id="resCorrect">0</div>
          <div class="stat-name">Correct</div>
        </div>
        <div class="stat">
          <div class="stat-num red" id="resWrong">0</div>
          <div class="stat-name">Wrong</div>
        </div>
        <div class="stat">
          <div class="stat-num yellow" id="resTime">0s</div>
          <div class="stat-name">Time</div>
        </div>
      </div>

      <div class="acc-wrap">
        <div class="acc-label">
          <span>Accuracy</span>
          <span id="accLabel">0%</span>
        </div>
        <div class="acc-track">
          <div class="acc-fill" id="accFill"></div>
        </div>
      </div>

      <button class="btn" id="btnRestart">PLAY AGAIN</button>
    </div>

  </div>

  <script>
    const TOTAL_ROUNDS = 10;
    const TIME_PER_ROUND = 4;

    const ALPHABET = 'abcdefghijklmnopqrstuvwxyz'.split('');

    let letters = [];
    let results = [];
    let round = 0;
    let startTime;
    let roundTimer;

    const gameScreen = document.getElementById('gameScreen');
    const resultScreen = document.getElementById('resultScreen');
    const charLetter = document.getElementById('charLetter');
    const charInput = document.getElementById('charInput');
    const roundNum = document.getElementById('roundNum');
    const dotsWrap = document.getElementById('dots');
    const feedback = document.getElementById('feedback');
    const timerBar = document.getElementById('timerBar');
    const resCorrect = document.getElementById('resCorrect');
    const resWrong = document.getElementById('resWrong');
    const resTime = document.getElementById('resTime');
    const accFill = document.getElementById('accFill');
    const accLabel = document.getElementById('accLabel');
    const resultTitle = document.getElementById('resultTitle');
    const btnRestart = document.getElementById('btnRestart');


    function generateLetters() {
      letters = [];
      for (let i = 0; i < TOTAL_ROUNDS; i++) {
        const randomIndex = Math.floor(Math.random() * ALPHABET.length);
        letters.push(ALPHABET[randomIndex]);
      }
    }


    function buildDots() {
      dotsWrap.innerHTML = '';
      for (let i = 0; i < TOTAL_ROUNDS; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dotsWrap.appendChild(dot);
      }
    }


    function showLetter(index) {
      charLetter.classList.remove('pop');
      void charLetter.offsetWidth;
      charLetter.classList.add('pop');
      charLetter.textContent = letters[index].toUpperCase();

      roundNum.textContent = index + 1;

      const allDots = dotsWrap.querySelectorAll('.dot');
      allDots.forEach((d, i) => d.classList.toggle('active', i === index));

      clearInterval(roundTimer);
      timerBar.style.transform = 'scaleX(1)';
      let timeLeft = TIME_PER_ROUND;

      roundTimer = setInterval(() => {
        timeLeft -= 0.05;
        timerBar.style.transform = `scaleX(${Math.max(0, timeLeft / TIME_PER_ROUND)})`;
        if (timeLeft <= 0) {
          clearInterval(roundTimer);
          recordAnswer(false);
        }
      }, 50);
    }

    charInput.addEventListener('input', (e) => {
      const typed = e.target.value.trim().toLowerCase();
      if (!typed || round >= TOTAL_ROUNDS) return;

      const isCorrect = (typed === letters[round]);
      recordAnswer(isCorrect);
    });


    function recordAnswer(isCorrect) {
      clearInterval(roundTimer);
      results.push(isCorrect);

      const allDots = dotsWrap.querySelectorAll('.dot');
      allDots[round].classList.remove('active');
      allDots[round].classList.add(isCorrect ? 'correct' : 'wrong');

      charInput.value = '';
      charInput.classList.add(isCorrect ? 'correct' : 'wrong');
      setTimeout(() => charInput.classList.remove('correct', 'wrong'), 400);

      feedback.textContent = isCorrect ? '✓ CORRECT' : '✗ WRONG';
      feedback.className = 'feedback show ' + (isCorrect ? 'ok' : 'err');
      setTimeout(() => { feedback.className = 'feedback'; }, 500);

      round++;

      if (round < TOTAL_ROUNDS) {
        setTimeout(() => showLetter(round), 400);
      } else {
        setTimeout(showResults, 600);
      }
    }


    function showResults() {

      clearInterval(roundTimer);

      const timeTaken = ((new Date() - startTime) / 1000).toFixed(1);
      const correct = results.filter(r => r === true).length;
      const wrong = TOTAL_ROUNDS - correct;
      const accuracy = Math.round((correct / TOTAL_ROUNDS) * 100);

      gameScreen.style.display = 'none';
      resultScreen.classList.add('show');

      resultTitle.textContent =
        accuracy === 100 ? 'PERFECT!' :
          accuracy >= 70 ? 'GREAT JOB' : 'KEEP GOING';

      resCorrect.textContent = correct;
      resWrong.textContent = wrong;
      resTime.textContent = timeTaken + 's';

      accLabel.textContent = accuracy + '%';
      requestAnimationFrame(() => { accFill.style.width = accuracy + '%'; });

    }


    function startGame() {
      round = 0;
      results = [];

      gameScreen.style.display = 'flex';
      resultScreen.classList.remove('show');
      charInput.value = '';
      feedback.className = 'feedback';
      timerBar.style.transform = 'scaleX(1)';

      generateLetters();
      buildDots();

      startTime = new Date();
      charInput.focus();
      showLetter(0);
    }

    btnRestart.addEventListener('click', startGame);
    startGame();
  </script>
</body>

</html>
